<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MANIT Assistant – Login</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🎓</div>
        <h1>MANIT Assistant</h1>
        <p class="auth-subtitle">Sign in to save your chat history</p>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"/>
        </div>
        <div id="loginError" class="auth-error" style="display:none"></div>
        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Login</button>
        <p class="auth-switch">Forgot password? <a href="#" onclick="handleForgotPassword()">Reset it</a></p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
        </div>
        <div id="signupError" class="auth-error" style="display:none"></div>
        <div id="signupSuccess" class="auth-success" style="display:none"></div>
        <button class="auth-btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MANIT College Assistant</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <span class="header-logo">🎓</span>
        <div class="header-title-block">
          <span class="header-title">MANIT Assistant</span>
          <span class="user-badge" id="userBadge"></span>
        </div>
      </div>
      <div class="header-btns">
        <button id="themeBtn"   onclick="toggleTheme()"  title="Toggle dark/light mode">🌙</button>
        <button id="exportBtn"  onclick="exportChat()"   title="Export chat as text">💾</button>
        <button id="newChatBtn" onclick="newChat()"      title="Clear and start new chat">🗑️</button>
        <button id="logoutBtn"  onclick="handleLogout()" title="Logout" class="logout-btn">🚪 Logout</button>
      </div>
    </div>

    <!-- PDF Bar -->
    <div class="pdf-bar" id="pdfBar">
      <label for="pdfInput" class="pdf-label" title="Upload a PDF to ask questions from it">📄 PDF</label>
      <input type="file" id="pdfInput" accept="application/pdf" style="display:none"/>
      <span id="pdfStatus" class="pdf-status">No PDF loaded</span>
      <button id="pdfClearBtn" class="pdf-clear-btn" onclick="clearPDF()" style="display:none">✕</button>
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatBox"></div>

    <!-- Quick Chips -->
    <div class="chips-bar" id="chipsBar">
      <button class="chip" onclick="useChip('When are the exams?')">📅 Exam Schedule</button>
      <button class="chip" onclick="useChip('What is the attendance rule?')">📋 Attendance</button>
      <button class="chip" onclick="useChip('Tell me about placements at MANIT')">💼 Placements</button>
      <button class="chip" onclick="useChip('What clubs and societies are there?')">🎭 Clubs</button>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask about MANIT…"/>
      <button onclick="sendMessage()" id="sendBtn" title="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Chatbot</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- PDF.js for client-side PDF text extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- marked.js for Markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      🎓 College Assistant
      <div class="header-btns">
        <button id="newChatBtn" onclick="newChat()" title="Start a new chat">🗑️ New</button>
        <button id="exportBtn" onclick="exportChat()" title="Export chat as text">💾 Export</button>
        <button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
      </div>
    </div>

    <!-- PDF Upload Banner -->
    <div class="pdf-bar" id="pdfBar">
      <label for="pdfInput" class="pdf-label" title="Upload a PDF to ask questions from it">
        📄 Upload PDF
      </label>
      <input type="file" id="pdfInput" accept="application/pdf" style="display:none"/>
      <span id="pdfStatus" class="pdf-status">No PDF loaded</span>
      <button id="pdfClearBtn" class="pdf-clear-btn" onclick="clearPDF()" style="display:none">✕ Clear</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <!-- Quick-reply suggestion chips -->
    <div class="chips-bar" id="chipsBar">
      <button class="chip" onclick="useChip('📅 When are the exams?')">📅 Exam Schedule</button>
      <button class="chip" onclick="useChip('📋 What is the attendance rule?')">📋 Attendance Rules</button>
      <button class="chip" onclick="useChip('📚 Explain the syllabus')">📚 Syllabus Info</button>
      <button class="chip" onclick="useChip('🏫 What are the college timings?')">🏫 College Timings</button>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask about your college..."/>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
